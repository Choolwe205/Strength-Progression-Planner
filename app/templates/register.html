{% extends "base.html" %}
{% block content %}
<div class="max-w-lg mx-auto">
  <h1 class="text-3xl font-bold mb-2">Create your profile</h1>
  <p class="text-gray-400 mb-8">We'll calculate your starting weights automatically.</p>

  <div class="card p-8 space-y-5">
    <div>
      <label class="block text-sm text-gray-400 mb-1">Full Name</label>
      <input id="name" type="text" class="input-field" placeholder="Janet Harper" />
    </div>
    <div>
      <label class="block text-sm text-gray-400 mb-1">Date of Birth</label>
     <input id="dob" type="date" class="input-field" title="Date of Birth" />
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm text-gray-400 mb-1">Weight (kg)</label>
        <input id="weight" type="number" class="input-field" placeholder="60" />
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1">Height (cm)</label>
        <input id="height" type="number" class="input-field" placeholder="170" />
      </div>
    </div>
    <div>
      <label class="block text-sm text-gray-400 mb-1">Experience Level</label>
      <select id="experience" class="input-field" title="Experience Level"></select>
        <option value="beginner">Beginner (0-1 year)</option>
        <option value="intermediate">Intermediate (1-3 years)</option>
      </select>
    </div>

    <div id="error" class="text-red-400 text-sm hidden"></div>

    <button class="btn-primary w-full mt-2" onclick="register()">Generate My Program →</button>
  </div>
</div>

<script>
async function register() {
  const name       = document.getElementById('name').value.trim();
  const dob        = document.getElementById('dob').value;
  const weight_kg  = parseFloat(document.getElementById('weight').value);
  const height_cm  = parseFloat(document.getElementById('height').value);
  const experience = document.getElementById('experience').value;
  const errEl      = document.getElementById('error');

  if (!name || !dob || !weight_kg || !height_cm) {
    errEl.textContent = 'Please fill in all fields.';
    errEl.classList.remove('hidden');
    return;
  }

  const res = await fetch('/api/users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, dob, weight_kg, height_cm, experience })
  });

  const data = await res.json();
  if (res.ok) {
    localStorage.setItem('user_id', data.user_id);
    localStorage.setItem('user_name', name);
    window.location.href = '/dashboard';
  } else {
    errEl.textContent = data.error || 'Something went wrong.';
    errEl.classList.remove('hidden');
  }
}
</script>
{% endblock %}
