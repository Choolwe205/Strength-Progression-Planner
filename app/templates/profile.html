{% extends "base.html" %}
{% block content %}
<div class="max-w-lg mx-auto">
  <h1 class="text-3xl font-bold mb-8">Your Profile</h1>
  <div class="card p-8 space-y-4" id="profile-card">
    <div class="text-center text-gray-400 py-4">Loading...</div>
  </div>
</div>

<script>
async function loadProfile() {
  const res  = await fetch('/api/session');
  const data = await res.json();

  if (!data.logged_in) {
    window.location.href = '/';
    return;
  }

  document.getElementById('profile-card').innerHTML = `
    <div class="flex justify-between border-b border-gray-800 pb-3">
      <span class="text-gray-400">Name</span>
      <span class="font-semibold">${data.user_name}</span>
    </div>
    <div class="flex justify-between border-b border-gray-800 pb-3">
      <span class="text-gray-400">Age</span>
      <span class="font-semibold">${data.user_age} years</span>
    </div>
    <div class="flex justify-between border-b border-gray-800 pb-3">
      <span class="text-gray-400">BMI</span>
      <span class="font-semibold">${data.user_bmi}</span>
    </div>
    <div class="flex justify-between border-b border-gray-800 pb-3">
      <span class="text-gray-400">Bodyweight</span>
      <span class="font-semibold">${data.user_weight} kg</span>
    </div>
    <button class="btn-primary w-full mt-4" onclick="window.location.href='/dashboard'">
      Go to Today's Workout
    </button>
    <button onclick="logout()"
      class="w-full mt-2 py-2 rounded-lg text-sm text-red-400 border border-red-900 hover:bg-red-900 hover:text-white transition">
      Sign Out
    </button>
  `;
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/';
}

loadProfile();
</script>
{% endblock %}
