{% extends "base.html" %}
{% block content %}
<div id="loading" class="text-center text-gray-400 py-20">Loading your workout...</div>
<div id="content" class="hidden">
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-3xl font-bold" id="greeting">Today's Workout</h1>
      <p class="text-gray-400 mt-1" id="subtitle">Complete all exercises and log your results.</p>
    </div>
    <button class="btn-primary" onclick="submitWorkout()">Log Workout ✓</button>
  </div>

  <div id="exercises" class="grid grid-cols-1 gap-5"></div>

  <div id="feedback" class="card p-6 mt-6 hidden">
    <p id="feedback-text" class="text-lg font-semibold"></p>
  </div>
</div>

<script>
const userId = localStorage.getItem('user_id');
const userName = localStorage.getItem('user_name');
if (!userId) window.location.href = '/';

const results = {};

async function loadWorkout() {
  const res = await fetch(`/api/workout/generate?user_id=${userId}`);
  const data = await res.json();

  document.getElementById('greeting').textContent = `Hey ${userName}, here's today's workout`;
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('content').classList.remove('hidden');

  const container = document.getElementById('exercises');
  data.workout.forEach(ex => {
    results[ex.exercise] = { completed: false, actual_reps: ex.reps, actual_weight: ex.weight, actual_sets: ex.sets };
    const weightLabel = ex.weight ? `${ex.weight} kg` : 'Bodyweight';
    const deloadBadge = ex.deload_active ? '<span class="text-xs bg-yellow-800 text-yellow-200 px-2 py-1 rounded ml-2">DELOAD</span>' : '';

    container.innerHTML += `
      <div class="card p-6" id="card-${ex.exercise}">
        <div class="flex justify-between items-start mb-4">
          <div>
            <h2 class="text-xl font-bold capitalize">${ex.exercise} ${deloadBadge}</h2>
            <p class="text-gray-400 text-sm mt-1">Target: ${ex.sets} sets × ${ex.reps} reps @ ${weightLabel}</p>
          </div>
          <div class="flex gap-3">
            <button onclick="markDone('${ex.exercise}', true)"
              class="px-4 py-2 rounded-lg text-sm font-semibold bg-green-800 text-green-200 hover:bg-green-700">
              ✓ Done
            </button>
            <button onclick="markDone('${ex.exercise}', false)"
              class="px-4 py-2 rounded-lg text-sm font-semibold bg-red-900 text-red-300 hover:bg-red-800">
              ✗ Failed
            </button>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-3 mt-2">
          <div>
            <label class="text-xs text-gray-500">Actual Sets</label>
            <input type="number" value="${ex.sets}" class="input-field mt-1 text-sm"
              onchange="results['${ex.exercise}'].actual_sets = parseInt(this.value)" />
          </div>
          <div>
            <label class="text-xs text-gray-500">Actual Reps</label>
            <input type="number" value="${ex.reps}" class="input-field mt-1 text-sm"
              onchange="results['${ex.exercise}'].actual_reps = parseInt(this.value)" />
          </div>
          <div>
            <label class="text-xs text-gray-500">Actual Weight (kg)</label>
            <input type="number" value="${ex.weight || 0}" class="input-field mt-1 text-sm"
              onchange="results['${ex.exercise}'].actual_weight = parseFloat(this.value)" />
          </div>
        </div>
      </div>`;
  });
}

function markDone(exercise, completed) {
  results[exercise].completed = completed;
  const card = document.getElementById(`card-${exercise}`);
  card.style.borderColor = completed ? '#16a34a' : '#dc2626';
}

async function submitWorkout() {
  const payload = {
    user_id: parseInt(userId),
    results: Object.entries(results).map(([exercise, data]) => ({ exercise, ...data }))
  };

  const res = await fetch('/api/workout/log', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  if (res.ok) {
    const fb = document.getElementById('feedback');
    const fbText = document.getElementById('feedback-text');
    const allDone = Object.values(results).every(r => r.completed);
    fbText.textContent = allDone
      ? '🔥 All exercises completed! Progression updated.'
      : '💪 Workout logged. Keep pushing — deload applied where needed.';
    fb.classList.remove('hidden');
    fb.style.borderColor = allDone ? '#16a34a' : '#ca8a04';
    setTimeout(() => window.location.href = '/analytics', 2000);
  }
}

loadWorkout();
</script>
{% endblock %}
