{% extends "base.html" %}
{% block content %}
<h1 class="text-3xl font-bold mb-2">Analytics</h1>
<p class="text-gray-400 mb-8">Your strength progression over time.</p>

<div class="grid grid-cols-2 gap-4 mb-8" id="summary-cards"></div>

<div class="grid grid-cols-1 gap-6">
  <div class="card p-6">
    <h2 class="text-lg font-semibold mb-4">Strength Trend (kg over time)</h2>
    <canvas id="trendChart" height="100"></canvas>
  </div>

  <div class="card p-6">
    <h2 class="text-lg font-semibold mb-4">Strength Balance (latest session)</h2>
    <div style="max-width:400px; margin:0 auto;">
      <canvas id="radarChart"></canvas>
    </div>
  </div>

  <div class="card p-6">
    <h2 class="text-lg font-semibold mb-4">Training Consistency - Last 12 Weeks</h2>
    <div class="flex gap-1 flex-wrap" id="heatmap"></div>
    <div class="flex gap-6 mt-4 text-xs text-gray-500">
      <span class="flex items-center gap-1">
        <span style="width:14px;height:14px;background:#222;border-radius:3px;display:inline-block;"></span> No workout
      </span>
      <span class="flex items-center gap-1">
        <span style="width:14px;height:14px;background:#1d4ed8;border-radius:3px;display:inline-block;"></span> Trained
      </span>
    </div>
  </div>
</div>

<script>
const COLORS = {
  bench: '#3b82f6', squat: '#10b981', deadlift: '#f59e0b', pullup: '#8b5cf6'
};

async function loadAnalytics() {
  const sessionRes  = await fetch('/api/session');
  const sessionData = await sessionRes.json();
  if (!sessionData.logged_in) { window.location.href = '/'; return; }

  const userId = sessionData.user_id;
  const res    = await fetch(`/api/analytics/${userId}`);
  const data   = await res.json();

  const exercises = ['bench', 'squat', 'deadlift', 'pullup'];

  // Summary cards
  const cards = document.getElementById('summary-cards');
  exercises.forEach(ex => {
    const history = data.analytics[ex];
    const last    = history.filter(h => h.weight).slice(-1)[0];
    const weight  = last ? `${last.weight} kg` : ex === 'pullup' ? 'Bodyweight' : 'No data yet';
    cards.innerHTML += `
      <div class="card p-5">
        <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">${ex === 'pullup' ? 'Pull-ups' : ex}</p>
        <p class="text-2xl font-bold" style="color:${COLORS[ex]}">${weight}</p>
      </div>`;
  });

  // Line chart
  const allDates = [...new Set(
    exercises.flatMap(ex => data.analytics[ex].map(w => w.date))
  )].sort();

  new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels: allDates,
      datasets: exercises.map(ex => ({
        label: ex.charAt(0).toUpperCase() + ex.slice(1),
        data: allDates.map(d => {
          const match = data.analytics[ex].find(w => w.date === d);
          return match ? match.weight : null;
        }),
        borderColor: COLORS[ex],
        backgroundColor: COLORS[ex] + '22',
        tension: 0.4, spanGaps: true, pointRadius: 4
      }))
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#ccc' } } },
      scales: {
        x: { ticks: { color: '#888' }, grid: { color: '#222' } },
        y: { ticks: { color: '#888' }, grid: { color: '#222' } }
      }
    }
  });

  // Radar chart
 const radarData = exercises.map(ex => {
    const history = data.analytics[ex];
    const last = history.filter(h => h.weight).slice(-1)[0];
    if (!last) return ex === 'pullup' ? 1.0 : 0;
    return parseFloat((last.weight / data.body_weight).toFixed(2));
  });

  new Chart(document.getElementById('radarChart'), {
    type: 'radar',
    data: {
      labels: ['Bench', 'Squat', 'Deadlift', 'Pull-ups'],
      datasets: [{
        label: 'Strength Profile',
        data: radarData,
        borderColor: '#3b82f6',
        backgroundColor: '#3b82f622',
        pointBackgroundColor: exercises.map(ex => COLORS[ex]),
        pointRadius: 5
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#ccc' } } },
      scales: {
        r: {
          ticks: { color: '#888', backdropColor: 'transparent' },
          grid: { color: '#333' },
          pointLabels: { color: '#ccc', font: { size: 13 } }
        }
      }
    }
  });

  // Consistency heatmap
  const allWorkoutDates = new Set(data.workout_dates || []);
  const heatmap = document.getElementById('heatmap');
  heatmap.innerHTML = '';

  const formatDateKey = (date) => {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  };

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const startDate = new Date(today);
  startDate.setDate(today.getDate() - 83);

  for (let i = 0; i < 84; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);

    const key = formatDateKey(d);
    const trained = allWorkoutDates.has(key);
    const box = document.createElement('div');
    box.title = `${key}${trained ? ' - trained' : ''}`;
    box.style.cssText = `
      width:14px;height:14px;border-radius:3px;
      background:${trained ? '#1d4ed8' : '#222'};
      cursor:default;
    `;
    heatmap.appendChild(box);
  }
}

loadAnalytics();
</script>
{% endblock %}
