{% extends "base.html" %}
{% block content %}
<h1 class="text-3xl font-bold mb-2">Analytics</h1>
<p class="text-gray-400 mb-8">Your strength progression over time.</p>

<div class="grid grid-cols-2 gap-4 mb-8" id="summary-cards"></div>

<div class="grid grid-cols-1 gap-6">
  <div class="card p-6">
    <h2 class="text-lg font-semibold mb-4">Strength Trend (kg over time)</h2>
    <canvas id="trendChart" height="100"></canvas>
  </div>
  <div class="card p-6">
    <h2 class="text-lg font-semibold mb-4">Strength-to-Bodyweight Ratio</h2>
    <canvas id="ratioChart" height="100"></canvas>
  </div>
</div>

<script>
const userId = localStorage.getItem('user_id');
if (!userId) window.location.href = '/';

const COLORS = {
  bench: '#3b82f6', squat: '#10b981', deadlift: '#f59e0b', pullup: '#8b5cf6'
};

async function loadAnalytics() {
  const res = await fetch(`/api/analytics/${userId}`);
  const data = await res.json();

  const cards = document.getElementById('summary-cards');
  const exercises = ['bench', 'squat', 'deadlift', 'pullup'];

  exercises.forEach(ex => {
    const history = data.analytics[ex];
    const last = history.filter(h => h.weight).slice(-1)[0];
    const weight = last ? `${last.weight} kg` : 'Bodyweight';
    const ratio = last && last.strength_ratio ? `${last.strength_ratio}× BW` : '—';
    cards.innerHTML += `
      <div class="card p-5">
        <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">${ex}</p>
        <p class="text-2xl font-bold" style="color:${COLORS[ex]}">${weight}</p>
        <p class="text-sm text-gray-400 mt-1">${ratio}</p>
      </div>`;
  });

  const allDates = [...new Set(
    exercises.flatMap(ex => data.analytics[ex].map(w => w.date))
  )].sort();

  new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels: allDates,
      datasets: exercises.filter(ex => ex !== 'pullup').map(ex => ({
        label: ex.charAt(0).toUpperCase() + ex.slice(1),
        data: allDates.map(d => {
          const match = data.analytics[ex].find(w => w.date === d);
          return match ? match.weight : null;
        }),
        borderColor: COLORS[ex],
        backgroundColor: COLORS[ex] + '22',
        tension: 0.4, spanGaps: true, pointRadius: 4
      }))
    },
    options: { responsive: true, plugins: { legend: { labels: { color: '#ccc' } } },
      scales: { x: { ticks: { color: '#888' }, grid: { color: '#222' } },
                y: { ticks: { color: '#888' }, grid: { color: '#222' } } } }
  });

  new Chart(document.getElementById('ratioChart'), {
    type: 'bar',
    data: {
      labels: allDates,
      datasets: exercises.filter(ex => ex !== 'pullup').map(ex => ({
        label: ex.charAt(0).toUpperCase() + ex.slice(1),
        data: allDates.map(d => {
          const match = data.analytics[ex].find(w => w.date === d);
          return match ? match.strength_ratio : null;
        }),
        backgroundColor: COLORS[ex] + '99',
      }))
    },
    options: { responsive: true, plugins: { legend: { labels: { color: '#ccc' } } },
      scales: { x: { ticks: { color: '#888' }, grid: { color: '#222' } },
                y: { ticks: { color: '#888' }, grid: { color: '#222' } } } }
  });
}

loadAnalytics();
</script>
{% endblock %}
